name: Deploy Docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version alias to deploy (e.g. 0.x, 1.x)'
        required: true
      alias:
        description: 'Alias (latest, stable, or leave empty)'
        required: false
        default: 'latest'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Resolve version alias (tag push)
        if: github.event_name == 'push'
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v1.2.3
          MAJOR=$(echo "$TAG" | sed 's/^v//' | cut -d. -f1)
          echo "alias=${MAJOR}.x" >> "$GITHUB_OUTPUT"

      - name: Deploy versioned docs (tag push)
        if: github.event_name == 'push'
        run: |
          mike deploy --push --update-aliases "${{ steps.version.outputs.alias }}" latest
          mike set-default --push latest

      - name: Deploy versioned docs (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "${{ inputs.alias }}" ]; then
            mike deploy --push --update-aliases "${{ inputs.version }}" "${{ inputs.alias }}"
          else
            mike deploy --push "${{ inputs.version }}"
          fi
          mike set-default --push latest
