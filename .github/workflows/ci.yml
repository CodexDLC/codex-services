name: CI Pipeline

on:
  push:
    branches: [develop, main]
    paths-ignore: ["**.md", "docs/**", ".gitignore"]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.7"

      - name: Sync dev environment
        run: uv sync --locked --extra dev

      - name: Run pre-commit
        run: uv run python tools/dev/check.py --lint

      - name: Run pip-audit
        run: uv run python tools/dev/check.py --security

      - name: Run mypy
        run: uv run python tools/dev/check.py --types

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    needs: quality-gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.7"

      - name: Sync dev environment
        run: uv sync --locked --extra dev

      - name: Run unit tests
        run: uv run pytest tests/ -m "unit" -v --tb=short

  integration-tests:
    name: Integration Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.7"

      - name: Sync dev environment
        run: uv sync --locked --extra dev

      - name: Run integration tests
        run: uv run pytest tests/ -m "integration" -v --tb=short
